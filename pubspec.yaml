name: society260_app
description: Society260 - A safe space in motion

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  provider: ^6.1.0

  # UI & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Media
  video_player: ^2.8.1
  audioplayers: ^5.2.1
  image_picker_web: ^3.0.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  uuid: ^4.3.3
  url_launcher: ^6.2.4
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9

  # Charts (Admin)
  fl_chart: ^0.67.0

  # Icons
  font_awesome_flutter: ^10.7.0

  # Backend
  supabase_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

