<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Society260 - A Safe Space In Motion">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Society260">

  <!-- Open Graph -->
  <meta property="og:title" content="Society260 — A Safe Space In Motion">
  <meta property="og:description" content="An independent mental health initiative fostering safe spaces for self-expression and growth.">
  <meta property="og:type" content="website">

  <title>Society260</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader-logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -2px;
      margin-bottom: 1.5rem;
      font-family: sans-serif;
    }

    .loader-logo span {
      color: #7ECFC0;
    }

    .loader-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7ECFC0, #E87B6E);
      border-radius: 2px;
      animation: load 2s ease forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-logo">SOCIETY<span>260</span></div>
    <div class="loader-bar">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function() { loader.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
